global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "event-collector"
    static_configs:
      - targets: ["event-collector:2112"]

  - job_name: "recommendation-api"
    static_configs:
      - targets: ["recommendation-api:2112"]

  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]

  - job_name: "dragonfly"
    static_configs:
      - targets: ["dragonfly:6380"]
