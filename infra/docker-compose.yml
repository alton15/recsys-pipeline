volumes:
  redpanda_data:
  dragonfly_data:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
  minio_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  airflow_logs:

networks:
  recsys:
    driver: bridge

services:
  # ──────────────────────────────────────────────
  # Redpanda — Kafka-compatible event streaming
  # ──────────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-schema-registry-addr
      - internal://redpanda:8081,external://localhost:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
    ports:
      - "9092:9092"
      - "8082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls", "localhost:9644"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Redpanda Console
  # ──────────────────────────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.0
    container_name: redpanda-console
    ports:
      - "8088:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # DragonflyDB — Redis-compatible feature store
  # ──────────────────────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.24.0
    container_name: dragonfly
    command: dragonfly --proactor_threads=2 --metrics_port=6380
    ports:
      - "6379:6379"
      - "6380:6380"
    volumes:
      - dragonfly_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Milvus dependencies — etcd
  # ──────────────────────────────────────────────
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - milvus_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Milvus dependencies — MinIO (internal)
  # ──────────────────────────────────────────────
  milvus-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Milvus — vector similarity search
  # ──────────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # MinIO — S3-compatible object storage (app use)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    command: minio server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # PostgreSQL — metadata store
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - ../configs/local.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-recsys}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Prometheus — metrics collection
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Grafana — dashboards & visualization
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Jaeger — distributed tracing
  # ──────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Alertmanager
  # ──────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Airflow — batch orchestration
  # ──────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.10.4-python3.12
    container_name: airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://recsys:recsys@postgres:5432/recsys
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    ports:
      - "8085:8080"
    volumes:
      - ../services/batch-processor/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        airflow webserver & airflow scheduler
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Stream Processor — Flink real-time features
  # ──────────────────────────────────────────────
  stream-processor:
    build:
      context: ..
      dockerfile: infra/docker/stream-processor.Dockerfile
    container_name: stream-processor
    environment:
      KAFKA_BROKERS: redpanda:29092
      DRAGONFLY_HOST: dragonfly
      DRAGONFLY_PORT: "6379"
      FLINK_PARALLELISM: "2"
      CONSUMER_GROUP: recsys-stream-processor
    depends_on:
      redpanda:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    restart: on-failure
    networks:
      - recsys

  # ──────────────────────────────────────────────
  # Triton Inference Server — model serving (Tier 3)
  # ──────────────────────────────────────────────
  triton:
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    container_name: triton
    ports:
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ../services/ranking-service/models:/models
    command: ["tritonserver", "--model-repository=/models", "--strict-model-config=false"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - recsys
