global:
  imageRegistry: "ghcr.io"
  imageTag: "latest"
  environment: "dev"

nameOverride: ""
fullnameOverride: ""

eventCollector:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: recsys-pipeline/event-collector
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    grpcPort: 50051
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPU: 80
  pdb:
    enabled: false
    minAvailable: 1
  env: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

recommendationApi:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: recsys-pipeline/recommendation-api
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    grpcPort: 50051
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPU: 80
  pdb:
    enabled: false
    minAvailable: 1
  env: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

streamProcessor:
  enabled: true
  replicas: 1
  taskManagers: 1
  image:
    registry: ""
    repository: recsys-pipeline/stream-processor
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  env: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

rankingService:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: recsys-pipeline/ranking-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    grpcPort: 50051
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPU: 80
  pdb:
    enabled: false
    minAvailable: 1
  env: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

envoy:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: envoyproxy/envoy
    tag: "v1.28-latest"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8080
    adminPort: 9901
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
