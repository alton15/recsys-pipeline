{{- if .Values.streamProcessor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recsys.fullname" . }}-stream-processor
  labels:
    {{- include "recsys.serviceLabels" (dict "Release" .Release "Chart" .Chart "serviceName" "stream-processor") | nindent 4 }}
spec:
  replicas: {{ .Values.streamProcessor.taskManagers }}
  selector:
    matchLabels:
      {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "stream-processor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "stream-processor") | nindent 8 }}
      {{- with .Values.streamProcessor.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: stream-processor
          image: {{ include "recsys.image" (dict "image" .Values.streamProcessor.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.streamProcessor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.streamProcessor.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.streamProcessor.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.streamProcessor.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.streamProcessor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamProcessor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamProcessor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
