{{- if .Values.streamProcessor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "recsys.fullname" . }}-stream-processor
  labels:
    {{- include "recsys.serviceLabels" (dict "Release" .Release "Chart" .Chart "serviceName" "stream-processor") | nindent 4 }}
spec:
  type: {{ .Values.streamProcessor.service.type }}
  ports:
    - name: http
      port: {{ .Values.streamProcessor.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "stream-processor") | nindent 4 }}
{{- end }}
