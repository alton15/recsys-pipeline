{{- if .Values.recommendationApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recsys.fullname" . }}-recommendation-api
  labels:
    {{- include "recsys.serviceLabels" (dict "Release" .Release "Chart" .Chart "serviceName" "recommendation-api") | nindent 4 }}
spec:
  replicas: {{ .Values.recommendationApi.replicas }}
  selector:
    matchLabels:
      {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "recommendation-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "recommendation-api") | nindent 8 }}
      {{- with .Values.recommendationApi.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: recommendation-api
          image: {{ include "recsys.image" (dict "image" .Values.recommendationApi.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.recommendationApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.recommendationApi.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.recommendationApi.service.grpcPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.recommendationApi.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.recommendationApi.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.recommendationApi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.recommendationApi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.recommendationApi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
