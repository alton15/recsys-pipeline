{{- if .Values.rankingService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recsys.fullname" . }}-ranking-service
  labels:
    {{- include "recsys.serviceLabels" (dict "Release" .Release "Chart" .Chart "serviceName" "ranking-service") | nindent 4 }}
spec:
  replicas: {{ .Values.rankingService.replicas }}
  selector:
    matchLabels:
      {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "ranking-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "ranking-service") | nindent 8 }}
      {{- with .Values.rankingService.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: ranking-service
          image: {{ include "recsys.image" (dict "image" .Values.rankingService.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.rankingService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.rankingService.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.rankingService.service.grpcPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.rankingService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.rankingService.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.rankingService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rankingService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rankingService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
