{{- if .Values.eventCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recsys.fullname" . }}-event-collector
  labels:
    {{- include "recsys.serviceLabels" (dict "Release" .Release "Chart" .Chart "serviceName" "event-collector") | nindent 4 }}
spec:
  replicas: {{ .Values.eventCollector.replicas }}
  selector:
    matchLabels:
      {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "event-collector") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "recsys.selectorLabels" (dict "Release" .Release "serviceName" "event-collector") | nindent 8 }}
      {{- with .Values.eventCollector.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: event-collector
          image: {{ include "recsys.image" (dict "image" .Values.eventCollector.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.eventCollector.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.eventCollector.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.eventCollector.service.grpcPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.eventCollector.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.eventCollector.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.eventCollector.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.eventCollector.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.eventCollector.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
