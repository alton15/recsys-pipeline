{{- if and .Values.eventCollector.enabled .Values.eventCollector.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "recsys.fullname" . }}-event-collector
  labels:
    {{- include "recsys.serviceLabels" (dict "Release" .Release "Chart" .Chart "serviceName" "event-collector") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "recsys.fullname" . }}-event-collector
  minReplicas: {{ .Values.eventCollector.hpa.minReplicas }}
  maxReplicas: {{ .Values.eventCollector.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.eventCollector.hpa.targetCPU }}
{{- end }}
